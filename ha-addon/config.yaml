name: "House Light Studio"
description: "Govee permanent light sequence designer with MQTT & local UDP control"
version: "0.1.0"
slug: "house_light_studio"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

startup: application
boot: auto

# Serve the designer UI through HA sidebar
ingress: true
ingress_port: 8099
panel_icon: mdi:led-strip-variant
panel_title: "Light Studio"

# Auto-connect to Mosquitto add-on if installed
services:
  - mqtt:need

# User-configurable options (fallback if MQTT service not available)
options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  scan_interval: 60
  topic_prefix: "govee_studio"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  scan_interval: int
  topic_prefix: str

# No special HA API access needed
homeassistant_api: false
hassio_api: false

# Port for direct access outside ingress (optional)
ports:
  8099/tcp: null
  8765/tcp: null

ports_description:
  8099/tcp: "Web UI (HTTP)"
  8765/tcp: "WebSocket bridge"
